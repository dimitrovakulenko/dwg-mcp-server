name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Init submodules
        run: git submodule update --init --recursive

      - name: Resolve LibreDWG revision
        id: libredwg-rev
        run: echo "rev=$(git -C third_party/libredwg rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install LibreDWG / Rust build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf automake bison build-essential clang flex libclang-dev \
            libtool libxml2-dev make pkg-config texinfo

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Restore cached LibreDWG build
        id: libredwg-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: third_party/libredwg/src/.libs
          key: libredwg-v1-${{ runner.os }}-${{ runner.arch }}-${{ steps.libredwg-rev.outputs.rev }}-${{ hashFiles('scripts/build-libredwg.sh') }}

      - name: Build LibreDWG (third_party)
        run: |
          if [ -f third_party/libredwg/src/.libs/libredwg.a ]; then
            echo "Using cached LibreDWG build"
          else
            bash scripts/build-libredwg.sh
          fi

      - name: Save LibreDWG build cache
        if: ${{ steps.libredwg-cache-restore.outputs.cache-hit != 'true' && hashFiles('third_party/libredwg/src/.libs/libredwg.a') != '' }}
        uses: actions/cache/save@v4
        with:
          path: third_party/libredwg/src/.libs
          key: ${{ steps.libredwg-cache-restore.outputs.cache-primary-key }}

      - name: Cargo test (workspace)
        run: cargo test --workspace

      - name: Build dwg-worker binary for Python tests
        run: cargo build -p dwg-worker

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python package (MCP host + deps)
        run: python3 -m pip install --user "./server"

      - name: Python integration tests (excludes Docker-only tests)
        env:
          DWG_WORKER_BIN: ${{ github.workspace }}/target/debug/dwg-worker
          PYTHONPATH: ${{ github.workspace }}/server/src
        run: |
          python3 -m unittest \
            server.tests.test_file_access \
            server.tests.test_host \
            server.tests.test_mcp_stdio \
            -v
